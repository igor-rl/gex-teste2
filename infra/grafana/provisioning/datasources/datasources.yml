apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "5s"

  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    database: gex
    user: pguser
    secureJsonData:
      password: pgpass
    jsonData:
      sslmode: disable
      postgresVersion: 1600