<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="700" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#f1f5f9">GEX — Pipeline de Integração de Vendas</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#64748b">AWS (LocalStack) · SQS · S3 · PostgreSQL · Node.js Microservices</text>

  <!-- ══ ZONE: ENTRADA ══ -->
  <rect x="20" y="75" width="200" height="180" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="120" y="97" text-anchor="middle" font-size="11" font-weight="bold" fill="#94a3b8" letter-spacing="1">ENTRADA</text>

  <!-- HTTP box -->
  <rect x="35" y="108" width="170" height="42" rx="6" fill="#1d4ed8" opacity="0.85"/>
  <text x="120" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">POST /events</text>
  <text x="120" y="141" text-anchor="middle" font-size="10" fill="#bfdbfe">Real-time (1 evento)</text>

  <!-- Batch box -->
  <rect x="35" y="160" width="170" height="42" rx="6" fill="#1d4ed8" opacity="0.85"/>
  <text x="120" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">POST /batch</text>
  <text x="120" y="193" text-anchor="middle" font-size="10" fill="#bfdbfe">CSV bulk (10k-1MM linhas)</text>

  <!-- S3 Upload box -->
  <rect x="35" y="212" width="170" height="32" rx="6" fill="#0369a1" opacity="0.85"/>
  <text x="120" y="227" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">S3 Upload</text>
  <text x="120" y="240" text-anchor="middle" font-size="10" fill="#bae6fd">gex-sales-batch</text>

  <!-- ══ INGESTION SERVICE ══ -->
  <rect x="262" y="95" width="140" height="140" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <rect x="262" y="95" width="140" height="28" rx="10" fill="#4f46e5"/>
  <rect x="262" y="109" width="140" height="14" fill="#4f46e5"/>
  <text x="332" y="113" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">INGESTION</text>
  <text x="332" y="126" text-anchor="middle" font-size="10" fill="#a5b4fc">:3001</text>
  <text x="332" y="152" text-anchor="middle" font-size="10" fill="#e2e8f0">• Parse CSV</text>
  <text x="332" y="167" text-anchor="middle" font-size="10" fill="#e2e8f0">• Correlation ID</text>
  <text x="332" y="182" text-anchor="middle" font-size="10" fill="#e2e8f0">• Batch → SQS chunks</text>
  <text x="332" y="197" text-anchor="middle" font-size="10" fill="#e2e8f0">• S3 backup CSV</text>
  <text x="332" y="212" text-anchor="middle" font-size="10" fill="#e2e8f0">• Idempotência</text>

  <!-- Arrows: entrada → ingestion -->
  <line x1="220" y1="129" x2="262" y2="140" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="220" y1="181" x2="262" y2="155" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="220" y1="228" x2="262" y2="200" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ══ SQS RAW FIFO ══ -->
  <rect x="445" y="100" width="150" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="520" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#fbbf24">SQS FIFO</text>
  <text x="520" y="135" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">gex-events-raw</text>
  <text x="520" y="150" text-anchor="middle" font-size="10" fill="#fcd34d">DLQ após 3 falhas</text>

  <!-- Arrow: ingestion → SQS raw -->
  <line x1="402" y1="145" x2="445" y2="130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-gold)"/>

  <!-- ══ VALIDATION SERVICE ══ -->
  <rect x="262" y="280" width="140" height="160" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <rect x="262" y="280" width="140" height="28" rx="10" fill="#059669"/>
  <rect x="262" y="294" width="140" height="14" fill="#059669"/>
  <text x="332" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">VALIDATION</text>
  <text x="332" y="312" text-anchor="middle" font-size="10" fill="#6ee7b7">Worker SQS</text>
  <text x="332" y="336" text-anchor="middle" font-size="10" fill="#e2e8f0">• Filtra approved</text>
  <text x="332" y="351" text-anchor="middle" font-size="10" fill="#e2e8f0">• Valida email/phone</text>
  <text x="332" y="366" text-anchor="middle" font-size="10" fill="#e2e8f0">• full_name, E.164</text>
  <text x="332" y="381" text-anchor="middle" font-size="10" fill="#e2e8f0">• Tags builder</text>
  <text x="332" y="396" text-anchor="middle" font-size="10" fill="#e2e8f0">• Audit trail → PG</text>
  <text x="332" y="411" text-anchor="middle" font-size="10" fill="#e2e8f0">• Concurrency: 10</text>

  <!-- Arrow: SQS raw → validation (down) -->
  <line x1="520" y1="160" x2="520" y2="230" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="520" y1="230" x2="332" y2="280" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-gold)"/>

  <!-- ══ SQS VALID FIFO ══ -->
  <rect x="445" y="295" width="150" height="55" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="520" y="315" text-anchor="middle" font-size="10" font-weight="bold" fill="#34d399">SQS FIFO</text>
  <text x="520" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">gex-leads-valid</text>
  <text x="520" y="343" text-anchor="middle" font-size="10" fill="#6ee7b7">Leads aprovados</text>

  <!-- SQS DISCARDED -->
  <rect x="445" y="365" width="150" height="55" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="520" y="385" text-anchor="middle" font-size="10" font-weight="bold" fill="#f87171">SQS</text>
  <text x="520" y="400" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">gex-leads-discarded</text>
  <text x="520" y="413" text-anchor="middle" font-size="10" fill="#fca5a5">Não-approved + email inválido</text>

  <!-- Arrows: validation → SQS valid / discarded -->
  <line x1="402" y1="340" x2="445" y2="320" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="402" y1="370" x2="445" y2="385" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- ══ DELIVERY SERVICE ══ -->
  <rect x="645" y="260" width="145" height="160" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="2"/>
  <rect x="645" y="260" width="145" height="28" rx="10" fill="#9333ea"/>
  <rect x="645" y="274" width="145" height="14" fill="#9333ea"/>
  <text x="717" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">DELIVERY</text>
  <text x="717" y="292" text-anchor="middle" font-size="10" fill="#d8b4fe">Worker SQS</text>
  <text x="717" y="316" text-anchor="middle" font-size="10" fill="#e2e8f0">• POST webhook.site</text>
  <text x="717" y="331" text-anchor="middle" font-size="10" fill="#e2e8f0">• Retry 3x backoff exp.</text>
  <text x="717" y="346" text-anchor="middle" font-size="10" fill="#e2e8f0">• Timeout 10s</text>
  <text x="717" y="361" text-anchor="middle" font-size="10" fill="#e2e8f0">• Jitter anti-thundering</text>
  <text x="717" y="376" text-anchor="middle" font-size="10" fill="#e2e8f0">• Concurrency: 5</text>
  <text x="717" y="391" text-anchor="middle" font-size="10" fill="#e2e8f0">• Rate limiting</text>
  <text x="717" y="406" text-anchor="middle" font-size="10" fill="#e2e8f0">• Resultado → SQS</text>

  <!-- Arrow: SQS valid → delivery -->
  <line x1="595" y1="320" x2="645" y2="330" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- SQS RESULTS -->
  <rect x="645" y="445" width="145" height="50" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="717" y="465" text-anchor="middle" font-size="10" font-weight="bold" fill="#d8b4fe">SQS</text>
  <text x="717" y="480" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">gex-delivery-results</text>
  <text x="717" y="492" text-anchor="middle" font-size="10" fill="#c4b5fd">enviado | erro</text>

  <!-- Arrow: delivery → SQS results -->
  <line x1="717" y1="420" x2="717" y2="445" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- ══ PERSISTENCE SERVICE ══ -->
  <rect x="645" y="520" width="145" height="130" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="645" y="520" width="145" height="28" rx="10" fill="#0284c7"/>
  <rect x="645" y="534" width="145" height="14" fill="#0284c7"/>
  <text x="717" y="538" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">PERSISTENCE</text>
  <text x="717" y="552" text-anchor="middle" font-size="10" fill="#7dd3fc">Worker SQS</text>
  <text x="717" y="574" text-anchor="middle" font-size="10" fill="#e2e8f0">• Upsert idempotente</text>
  <text x="717" y="589" text-anchor="middle" font-size="10" fill="#e2e8f0">• ON CONFLICT</text>
  <text x="717" y="604" text-anchor="middle" font-size="10" fill="#e2e8f0">• Audit trail</text>
  <text x="717" y="619" text-anchor="middle" font-size="10" fill="#e2e8f0">• Results + Discarded</text>
  <text x="717" y="634" text-anchor="middle" font-size="10" fill="#e2e8f0">• Concurrency: 20</text>
  <text x="717" y="649" text-anchor="middle" font-size="10" fill="#e2e8f0">• Pool 20 conexões</text>

  <!-- Arrow: SQS results → persistence -->
  <line x1="717" y1="495" x2="717" y2="520" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ══ POSTGRESQL ══ -->
  <rect x="840" y="440" width="145" height="120" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="840" y="440" width="145" height="28" rx="10" fill="#1e40af"/>
  <rect x="840" y="454" width="145" height="14" fill="#1e40af"/>
  <text x="912" y="458" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">POSTGRESQL</text>
  <text x="912" y="472" text-anchor="middle" font-size="10" fill="#93c5fd">:5432</text>
  <text x="912" y="494" text-anchor="middle" font-size="10" fill="#e2e8f0">lead_control</text>
  <text x="912" y="509" text-anchor="middle" font-size="10" fill="#e2e8f0">lead_audit_trail</text>
  <text x="912" y="524" text-anchor="middle" font-size="10" fill="#64748b">+ views:</text>
  <text x="912" y="539" text-anchor="middle" font-size="10" fill="#94a3b8">lead_summary</text>
  <text x="912" y="554" text-anchor="middle" font-size="10" fill="#94a3b8">latency_metrics</text>

  <!-- Arrow: persistence → PG -->
  <line x1="790" y1="580" x2="840" y2="530" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Discarded → persistence path -->
  <line x1="595" y1="390" x2="620" y2="390" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="620" y1="390" x2="620" y2="600" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="620" y1="600" x2="645" y2="600" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-red)"/>

  <!-- ══ OBSERVABILITY ══ -->
  <rect x="840" y="75" width="145" height="200" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <rect x="840" y="75" width="145" height="28" rx="10" fill="#b45309"/>
  <rect x="840" y="89" width="145" height="14" fill="#b45309"/>
  <text x="912" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">OBSERVABILITY</text>
  <text x="912" y="107" text-anchor="middle" font-size="10" fill="#fcd34d">:3005</text>
  <text x="912" y="129" text-anchor="middle" font-size="10" fill="#e2e8f0">/health</text>
  <text x="912" y="144" text-anchor="middle" font-size="10" fill="#e2e8f0">/metrics/queues</text>
  <text x="912" y="159" text-anchor="middle" font-size="10" fill="#e2e8f0">/metrics/latency</text>
  <text x="912" y="174" text-anchor="middle" font-size="10" fill="#e2e8f0">/metrics/error-rate</text>
  <text x="912" y="189" text-anchor="middle" font-size="10" fill="#e2e8f0">/metrics/pipeline-health</text>
  <text x="912" y="204" text-anchor="middle" font-size="10" fill="#e2e8f0">/metrics/reconciliation</text>
  <text x="912" y="219" text-anchor="middle" font-size="10" fill="#e2e8f0">/metrics/dlq</text>
  <text x="912" y="234" text-anchor="middle" font-size="10" fill="#e2e8f0">/audit/:orderId</text>
  <text x="912" y="259" text-anchor="middle" font-size="10" fill="#64748b">Lê: SQS + PostgreSQL</text>

  <!-- Dashed lines: observability reads from queues/DB -->
  <line x1="912" y1="275" x2="912" y2="440" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="840" y1="175" x2="595" y2="322" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- ══ WEBHOOK EXTERNAL ══ -->
  <rect x="840" y="290" width="145" height="60" rx="10" fill="#1e293b" stroke="#e879f9" stroke-width="2"/>
  <text x="912" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#e879f9">webhook.site</text>
  <text x="912" y="330" text-anchor="middle" font-size="10" fill="#f0abfc">API externa</text>
  <text x="912" y="343" text-anchor="middle" font-size="10" fill="#94a3b8">Plataforma de marketing</text>

  <!-- Arrow: delivery → webhook -->
  <line x1="790" y1="325" x2="840" y2="318" stroke="#e879f9" stroke-width="2" marker-end="url(#arrow-pink)"/>

  <!-- ══ DLQ ══ -->
  <rect x="20" y="530" width="130" height="50" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
  <text x="85" y="551" text-anchor="middle" font-size="10" font-weight="bold" fill="#f87171">SQS DLQ</text>
  <text x="85" y="566" text-anchor="middle" font-size="10" fill="#fff">gex-events-raw-dlq</text>
  <text x="85" y="578" text-anchor="middle" font-size="10" fill="#fca5a5">Falhas fatais</text>

  <!-- Arrow hints DLQ from raw -->
  <line x1="520" y1="160" x2="85" y2="530" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,5" opacity="0.5"/>
  <text x="270" y="390" font-size="9" fill="#ef4444" opacity="0.8">após 3 falhas →</text>

  <!-- ══ LOCALSTACK badge ══ -->
  <rect x="20" y="430" width="130" height="40" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="85" y="448" text-anchor="middle" font-size="10" font-weight="bold" fill="#fbbf24">LocalStack</text>
  <text x="85" y="463" text-anchor="middle" font-size="10" fill="#94a3b8">SQS · S3 · SNS · CW</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow-gold"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-red"    markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/>
    </marker>
    <marker id="arrow-blue"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrow-pink"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e879f9"/>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="20" y="630" font-size="10" fill="#64748b">Fluxo principal ──►   Descartados ╌╌►   Observabilidade ····</text>
</svg>
